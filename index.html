<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Milk Maze</title>
  <style>
    :root {
      --bg: #0d0f13;
      --panel: #171b22;
      --text: #f2f2f2;
      --accent: #7dd3fc;
      --warn: #fb7185;
      --ok: #86efac;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 25% 15%, #111827, #05070b 65%);
      color: var(--text);
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: block;
    }

    canvas {
      width: 100vw;
      height: 100vh;
      border: 0;
      border-radius: 0;
      background: #000;
      image-rendering: pixelated;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1280" height="720"></canvas>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    const worldW = 56;
    const worldH = 56;
    const fov = Math.PI / 3;
    const rayCount = 320;
    const maxDist = 34;
    const moveSpeed = 2.8;
    const mouseSensitivity = 0.00065;
    const enemySpeed = 0.9;
    const enemyWanderSpeed = 0.45;
    const enemyAggroRange = 6.5;
    const baseEnemyCount = 14;
    const baseMilkCount = 12;
    const baseAmmoCrateCount = 10;
    const baseLifestealRatio = 0.32;
    const enemyDefs = {
      melee: { hp: 46, xp: 15, touchDps: 20, ranged: false, speed: 1.0 },
      stalker: { hp: 34, xp: 18, touchDps: 24, ranged: false, speed: 1.34 },
      brute: { hp: 88, xp: 30, touchDps: 32, ranged: false, speed: 0.72 },
      flame: { hp: 55, xp: 22, touchDps: 18, ranged: true, speed: 0.95 },
      lightning: { hp: 70, xp: 32, touchDps: 22, ranged: true, speed: 1.08 },
      poison: { hp: 62, xp: 28, touchDps: 17, ranged: true, speed: 0.9 }
    };
    const floorThemes = [
      { name: "Basement Hollows", roomTarget: 22, roomMin: 6, roomMax: 12, hallMin: 2, hallMax: 3, extraLinks: 10, pillarChance: 0.18 },
      { name: "Catacomb Grid", roomTarget: 26, roomMin: 6, roomMax: 11, hallMin: 2, hallMax: 3, extraLinks: 13, pillarChance: 0.26 },
      { name: "Foundry Warrens", roomTarget: 28, roomMin: 5, roomMax: 10, hallMin: 2, hallMax: 4, extraLinks: 16, pillarChance: 0.34 },
      { name: "Abyssal Labyrinth", roomTarget: 31, roomMin: 5, roomMax: 9, hallMin: 2, hallMax: 4, extraLinks: 18, pillarChance: 0.4 }
    ];
    const weaponDefs = [
      { id: "rifle", name: "Rifle", emoji: "🔫", ammoCost: 1, pellets: 1, spread: 0.005, cooldown: 0.19, damage: 28, speed: 9.2, life: 1.3, hitRadius: 0.30, muzzle: 0.10 },
      { id: "smg", name: "SMG", emoji: "🧨", ammoCost: 1, pellets: 1, spread: 0.024, cooldown: 0.075, damage: 14, speed: 8.8, life: 1.05, hitRadius: 0.28, muzzle: 0.08 },
      { id: "shotgun", name: "Shotgun", emoji: "💥", ammoCost: 2, pellets: 7, spread: 0.12, cooldown: 0.62, damage: 12, speed: 7.2, life: 0.78, hitRadius: 0.34, muzzle: 0.14 },
      { id: "sniper", name: "Sniper", emoji: "🎯", ammoCost: 3, pellets: 1, spread: 0.0018, cooldown: 0.95, damage: 78, speed: 14.5, life: 1.9, hitRadius: 0.26, muzzle: 0.17 }
    ];

    const keys = new Set();
    let isMouseDown = false;
    let dungeonLevel = 1;
    let choosingSkill = false;
    let gamePaused = false;
    let gameState = "playing";

    const player = {
      x: 1.5,
      y: 1.5,
      a: 0,
      maxHp: 100,
      hp: 100,
      maxAmmo: 64,
      ammo: 24,
      weaponIndex: 0,
      fireRateMult: 1,
      damageMult: 1,
      lifestealBonus: 0,
      damageReduction: 0,
      ammoPickupMult: 1,
      enemySlowPower: 0,
      fireballDamageMult: 1,
      fireballCooldownMult: 1,
      fireballCooldown: 0,
      xp: 0,
      xpLevel: 1,
      xpToNext: 70,
      floorName: floorThemes[0].name,
      skills: {
        fireball: false,
        rapid: false,
        tough: false,
        overcharge: false,
        siphon: false,
        scavenger: false,
        frost: false,
        inferno: false,
        bulwark: false
      },
      shootCooldown: 0,
      muzzleFlash: 0
    };

    const milks = [];
    const ammoCrates = [];
    const enemies = [];
    const bullets = [];
    const enemyProjectiles = [];
    const stairs = { x: 0, y: 0, active: false };
    const skillTree = [
      { id: "rapid", label: "Rapid Trigger", desc: "20% faster weapon fire rate", requires: [], row: 0, col: 0, icon: "R" },
      { id: "fireball", label: "Fireball Cast", desc: "Press F to launch fireball", requires: [], row: 0, col: 1, icon: "F" },
      { id: "tough", label: "Hardened Body", desc: "20% more max HP immediately", requires: [], row: 0, col: 2, icon: "T" },
      { id: "overcharge", label: "Overcharge", desc: "+18% bullet damage", requires: ["rapid"], row: 1, col: 0, icon: "D" },
      { id: "siphon", label: "Blood Siphon", desc: "+12% lifesteal", requires: ["fireball"], row: 1, col: 1, icon: "V" },
      { id: "scavenger", label: "Scavenger", desc: "+40% ammo from crates", requires: ["tough"], row: 1, col: 2, icon: "A" },
      { id: "frost", label: "Cryo Rounds", desc: "Hits slow enemies by 25%", requires: ["overcharge"], row: 2, col: 0, icon: "C" },
      { id: "inferno", label: "Inferno Core", desc: "Fireball damage +40%, cooldown -20%", requires: ["siphon"], row: 2, col: 1, icon: "I" },
      { id: "bulwark", label: "Bulwark", desc: "Take 15% less damage", requires: ["scavenger"], row: 2, col: 2, icon: "B" }
    ];
    let selectableSkills = [];
    let floorTiles = [];
    let wallGrid = [];
    let rooms = [];
    let totalMilk = 0;

    function randInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function hasSkill(id) {
      return !!player.skills[id];
    }

    function getFloorTheme() {
      const idx = (dungeonLevel - 1) % floorThemes.length;
      const tier = Math.floor((dungeonLevel - 1) / floorThemes.length);
      return { ...floorThemes[idx], tier };
    }

    function getAvailableSkills() {
      return skillTree.filter(s => !hasSkill(s.id) && s.requires.every(hasSkill));
    }

    function chooseSkillOptions() {
      const available = getAvailableSkills();
      if (available.length <= 6) return available;
      const shuffled = [...available];
      for (let i = shuffled.length - 1; i > 0; i--) {
        const j = randInt(0, i);
        [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
      }
      return shuffled.slice(0, 6);
    }

    function applySkill(id) {
      if (hasSkill(id)) return false;
      player.skills[id] = true;
      if (id === "fireball") return true;
      if (id === "rapid") player.fireRateMult *= 0.8;
      if (id === "tough") {
        player.maxHp = Math.round(player.maxHp * 1.2);
        player.hp = Math.min(player.maxHp, player.hp + Math.round(player.maxHp * 0.2));
      }
      if (id === "overcharge") player.damageMult *= 1.18;
      if (id === "siphon") player.lifestealBonus += 0.12;
      if (id === "scavenger") player.ammoPickupMult *= 1.4;
      if (id === "frost") player.enemySlowPower = Math.max(player.enemySlowPower, 0.25);
      if (id === "inferno") {
        player.fireballDamageMult *= 1.4;
        player.fireballCooldownMult *= 0.8;
      }
      if (id === "bulwark") player.damageReduction = Math.min(0.45, player.damageReduction + 0.15);
      return true;
    }

    function dealDamageToPlayer(rawAmount) {
      const reduced = rawAmount * (1 - player.damageReduction);
      player.hp -= reduced;
    }

    function rectsOverlap(a, b, margin = 1) {
      return !(
        a.x + a.w + margin <= b.x ||
        b.x + b.w + margin <= a.x ||
        a.y + a.h + margin <= b.y ||
        b.y + b.h + margin <= a.y
      );
    }

    function carveRect(x, y, w, h, val = 0) {
      for (let yy = y; yy < y + h; yy++) {
        for (let xx = x; xx < x + w; xx++) {
          if (xx > 0 && yy > 0 && xx < worldW - 1 && yy < worldH - 1) {
            wallGrid[yy][xx] = val;
          }
        }
      }
    }

    function carveCorridor(x1, y1, x2, y2, width = 2) {
      const horizontalFirst = Math.random() < 0.5;
      if (horizontalFirst) {
        const sx = Math.min(x1, x2);
        carveRect(sx, y1 - Math.floor(width / 2), Math.abs(x2 - x1) + 1, width, 0);
        const sy = Math.min(y1, y2);
        carveRect(x2 - Math.floor(width / 2), sy, width, Math.abs(y2 - y1) + 1, 0);
      } else {
        const sy = Math.min(y1, y2);
        carveRect(x1 - Math.floor(width / 2), sy, width, Math.abs(y2 - y1) + 1, 0);
        const sx = Math.min(x1, x2);
        carveRect(sx, y2 - Math.floor(width / 2), Math.abs(x2 - x1) + 1, width, 0);
      }
    }

    function addRoomPillars(room, chance = 0.25) {
      if (room.w < 9 || room.h < 9 || Math.random() > chance) return;
      for (let py = room.y + 2; py < room.y + room.h - 2; py += 3) {
        for (let px = room.x + 2; px < room.x + room.w - 2; px += 3) {
          if (Math.abs(px - room.cx) <= 1 && Math.abs(py - room.cy) <= 1) continue;
          wallGrid[py][px] = 1;
        }
      }
    }

    function generateRandomMap() {
      const theme = getFloorTheme();
      const roomGoal = Math.min(40, theme.roomTarget + theme.tier * 3);
      const roomTryCount = 300 + roomGoal * 18;
      const minRoom = Math.max(5, theme.roomMin - Math.floor(theme.tier * 0.3));
      const maxRoom = Math.min(14, theme.roomMax + Math.floor(theme.tier * 0.35));
      player.floorName = theme.name;

      wallGrid = Array.from({ length: worldH }, () => Array(worldW).fill(1));
      rooms = [];

      for (let i = 0; i < roomTryCount && rooms.length < roomGoal; i++) {
        const rw = randInt(minRoom, maxRoom);
        const rh = randInt(minRoom, maxRoom);
        const rx = randInt(1, worldW - rw - 2);
        const ry = randInt(1, worldH - rh - 2);
        const room = {
          x: rx,
          y: ry,
          w: rw,
          h: rh,
          cx: rx + Math.floor(rw / 2),
          cy: ry + Math.floor(rh / 2)
        };
        if (rooms.some(r => rectsOverlap(room, r, 2))) continue;
        carveRect(room.x, room.y, room.w, room.h, 0);
        rooms.push(room);
      }

      for (let i = 1; i < rooms.length; i++) {
        const a = rooms[i - 1];
        const b = rooms[i];
        carveCorridor(a.cx, a.cy, b.cx, b.cy, randInt(theme.hallMin, theme.hallMax));
      }

      for (let i = 0; i < theme.extraLinks + theme.tier * 2 && rooms.length > 2; i++) {
        const a = rooms[randInt(0, rooms.length - 1)];
        const b = rooms[randInt(0, rooms.length - 1)];
        if (a !== b) carveCorridor(a.cx, a.cy, b.cx, b.cy, randInt(theme.hallMin, theme.hallMax));
      }

      if (rooms.length === 0) {
        const fallback = { x: 4, y: 4, w: 10, h: 10, cx: 9, cy: 9 };
        carveRect(fallback.x, fallback.y, fallback.w, fallback.h, 0);
        rooms.push(fallback);
      }

      for (const room of rooms) addRoomPillars(room, theme.pillarChance + theme.tier * 0.03);

      floorTiles = [];
      for (let y = 0; y < worldH; y++) {
        for (let x = 0; x < worldW; x++) {
          if (wallGrid[y][x] === 0) floorTiles.push({ x: x + 0.5, y: y + 0.5 });
        }
      }

      const start = rooms[0] || { cx: 2, cy: 2 };
      player.x = start.cx + 0.5;
      player.y = start.cy + 0.5;
      player.a = -Math.PI / 2;
    }

    function difficultyScale() {
      return 1 + (dungeonLevel - 1) * 0.24;
    }

    function levelEnemyTarget() {
      return baseEnemyCount + dungeonLevel * 4;
    }

    function levelMilkTarget() {
      return baseMilkCount + dungeonLevel * 3;
    }

    function levelAmmoTarget() {
      return baseAmmoCrateCount + Math.floor(dungeonLevel * 1.5);
    }

    function pickEnemyKind() {
      if (dungeonLevel <= 1) return Math.random() < 0.2 ? "stalker" : "melee";
      if (dungeonLevel === 2) {
        const r = Math.random();
        if (r < 0.45) return "melee";
        if (r < 0.72) return "stalker";
        return "flame";
      }
      if (dungeonLevel === 3) {
        const r = Math.random();
        if (r < 0.34) return "melee";
        if (r < 0.56) return "stalker";
        if (r < 0.8) return "flame";
        return "brute";
      }
      const r = Math.random();
      if (r < 0.20) return "lightning";
      if (r < 0.41) return "flame";
      if (r < 0.58) return "poison";
      if (r < 0.75) return "brute";
      if (r < 0.9) return "stalker";
      return "melee";
    }

    function createEnemy(x, y) {
      const kind = pickEnemyKind();
      const scale = difficultyScale();
      const def = enemyDefs[kind] || enemyDefs.melee;
      return {
        x,
        y,
        kind,
        hp: Math.round(def.hp * scale),
        hurt: 0,
        slowTimer: 0,
        chargeTimer: 0.6 + Math.random() * 1.2,
        wanderAngle: Math.random() * Math.PI * 2,
        wanderTimer: 0.6 + Math.random() * 1.6,
        shootTimer: 0.7 + Math.random() * 1.4
      };
    }

    function spawnEntities() {
      milks.length = 0;
      ammoCrates.length = 0;
      enemies.length = 0;
      bullets.length = 0;
      enemyProjectiles.length = 0;
      stairs.active = false;

      let spawnAttempts = 0;
      while (enemies.length < levelEnemyTarget() && spawnAttempts < 7000) {
        spawnAttempts += 1;
        const tile = floorTiles[randInt(0, floorTiles.length - 1)];
        if (!tile) break;
        if (Math.hypot(tile.x - player.x, tile.y - player.y) < 6.5) continue;
        if (enemies.some(e => Math.hypot(tile.x - e.x, tile.y - e.y) < 1.6)) continue;
        enemies.push(createEnemy(tile.x, tile.y));
      }

      spawnAttempts = 0;
      while (milks.length < levelMilkTarget() && spawnAttempts < 7000) {
        spawnAttempts += 1;
        const tile = floorTiles[randInt(0, floorTiles.length - 1)];
        if (!tile) break;
        if (Math.hypot(tile.x - player.x, tile.y - player.y) < 4.8) continue;
        if (milks.some(m => Math.hypot(tile.x - m.x, tile.y - m.y) < 1.5)) continue;
        if (enemies.some(e => Math.hypot(tile.x - e.x, tile.y - e.y) < 1.1)) continue;
        milks.push({ x: tile.x, y: tile.y, taken: false });
      }

      spawnAttempts = 0;
      while (ammoCrates.length < levelAmmoTarget() && spawnAttempts < 7000) {
        spawnAttempts += 1;
        const tile = floorTiles[randInt(0, floorTiles.length - 1)];
        if (!tile) break;
        if (Math.hypot(tile.x - player.x, tile.y - player.y) < 3.6) continue;
        if (milks.some(m => Math.hypot(tile.x - m.x, tile.y - m.y) < 1.0)) continue;
        if (ammoCrates.some(a => Math.hypot(tile.x - a.x, tile.y - a.y) < 1.5)) continue;
        ammoCrates.push({
          x: tile.x,
          y: tile.y,
          amount: randInt(7, 14),
          taken: false
        });
      }

      player.hp = Math.min(player.maxHp, player.hp + 24);
      player.ammo = Math.min(player.maxAmmo, player.ammo + 24);
      totalMilk = milks.length;
      gameState = "playing";
    }

    generateRandomMap();
    spawnEntities();

    function placeStairs() {
      let attempts = 0;
      while (attempts < 2500) {
        attempts += 1;
        const t = floorTiles[randInt(0, floorTiles.length - 1)];
        if (!t) break;
        if (Math.hypot(t.x - player.x, t.y - player.y) < 10) continue;
        if (milks.some(m => !m.taken && Math.hypot(t.x - m.x, t.y - m.y) < 1.5)) continue;
        if (enemies.some(e => e.hp > 0 && Math.hypot(t.x - e.x, t.y - e.y) < 2.0)) continue;
        stairs.x = t.x;
        stairs.y = t.y;
        stairs.active = true;
        return;
      }
      stairs.x = player.x + 2;
      stairs.y = player.y + 2;
      stairs.active = true;
    }

    function gainXp(amount) {
      player.xp += amount;
      while (player.xp >= player.xpToNext) {
        player.xp -= player.xpToNext;
        player.xpLevel += 1;
        player.xpToNext = Math.round(player.xpToNext * 1.18 + 18);
        selectableSkills = chooseSkillOptions();
        if (selectableSkills.length > 0) {
          choosingSkill = true;
          gamePaused = true;
        } else {
          player.maxHp += 4;
          player.hp = Math.min(player.maxHp, player.hp + 4);
        }
      }
    }

    function tryPickSkill(index) {
      if (!choosingSkill) return false;
      const choice = selectableSkills[index];
      if (!choice) return false;
      if (!applySkill(choice.id)) {
        return false;
      }
      selectableSkills = [];
      choosingSkill = false;
      gamePaused = false;
      return true;
    }

    function advanceFloor() {
      dungeonLevel += 1;
      generateRandomMap();
      spawnEntities();
    }

    function isWall(x, y) {
      const tx = Math.floor(x);
      const ty = Math.floor(y);
      if (tx < 0 || ty < 0 || tx >= worldW || ty >= worldH) return true;
      return wallGrid[ty][tx] === 1;
    }

    function canMove(x, y, r = 0.22) {
      return !isWall(x - r, y - r) &&
             !isWall(x + r, y - r) &&
             !isWall(x - r, y + r) &&
             !isWall(x + r, y + r);
    }

    function raycast(ox, oy, angle) {
      const step = 0.02;
      let dist = 0;
      while (dist < maxDist) {
        const x = ox + Math.cos(angle) * dist;
        const y = oy + Math.sin(angle) * dist;
        if (isWall(x, y)) {
          return {
            dist,
            hitX: x,
            hitY: y,
            cellX: Math.floor(x),
            cellY: Math.floor(y)
          };
        }
        dist += step;
      }
      return {
        dist: maxDist,
        hitX: ox + Math.cos(angle) * maxDist,
        hitY: oy + Math.sin(angle) * maxDist,
        cellX: -1,
        cellY: -1
      };
    }

    function update(dt) {
      if (gameState !== "playing" || gamePaused) return;

      let forward = 0;
      let strafe = 0;
      if (keys.has("w")) forward += 1;
      if (keys.has("s")) forward -= 1;
      if (keys.has("a")) strafe -= 1;
      if (keys.has("d")) strafe += 1;
      const dx = (Math.cos(player.a) * forward + Math.cos(player.a + Math.PI / 2) * strafe) * moveSpeed * dt;
      const dy = (Math.sin(player.a) * forward + Math.sin(player.a + Math.PI / 2) * strafe) * moveSpeed * dt;

      const nx = player.x + dx;
      const ny = player.y + dy;
      if (canMove(nx, player.y)) player.x = nx;
      if (canMove(player.x, ny)) player.y = ny;

      player.shootCooldown = Math.max(0, player.shootCooldown - dt);
      player.muzzleFlash = Math.max(0, player.muzzleFlash - dt);
      player.fireballCooldown = Math.max(0, player.fireballCooldown - dt);
      if (isMouseDown && document.pointerLockElement === canvas && weaponDefs[player.weaponIndex].id === "smg") shoot();

      for (const m of milks) {
        if (!m.taken) {
          const d = Math.hypot(m.x - player.x, m.y - player.y);
          if (d < 0.45) m.taken = true;
        }
      }
      for (const crate of ammoCrates) {
        if (!crate.taken) {
          const d = Math.hypot(crate.x - player.x, crate.y - player.y);
          if (d < 0.5) {
            crate.taken = true;
            player.ammo = Math.min(player.maxAmmo, player.ammo + Math.round(crate.amount * player.ammoPickupMult));
          }
        }
      }

      for (const e of enemies) {
        if (e.hp <= 0) continue;
        e.hurt = Math.max(0, e.hurt - dt * 2);
        e.slowTimer = Math.max(0, e.slowTimer - dt);

        const vx = player.x - e.x;
        const vy = player.y - e.y;
        const d = Math.hypot(vx, vy);
        const diff = difficultyScale();
        const def = enemyDefs[e.kind] || enemyDefs.melee;
        const slowFactor = e.slowTimer > 0 ? (1 - player.enemySlowPower) : 1;
        const moveMul = def.speed * slowFactor;

        if (def.ranged) {
          e.shootTimer -= dt;
          if (d < 3.2) {
            const ex = e.x - (vx / Math.max(0.001, d)) * enemySpeed * moveMul * 0.65 * dt;
            const ey = e.y - (vy / Math.max(0.001, d)) * enemySpeed * moveMul * 0.65 * dt;
            if (canMove(ex, e.y, 0.2)) e.x = ex;
            if (canMove(e.x, ey, 0.2)) e.y = ey;
          } else if (d > 6.4) {
            const ex = e.x + (vx / Math.max(0.001, d)) * enemySpeed * moveMul * 0.55 * dt;
            const ey = e.y + (vy / Math.max(0.001, d)) * enemySpeed * moveMul * 0.55 * dt;
            if (canMove(ex, e.y, 0.2)) e.x = ex;
            if (canMove(e.x, ey, 0.2)) e.y = ey;
          } else {
            e.wanderTimer -= dt;
            if (e.wanderTimer <= 0) {
              e.wanderAngle = Math.random() * Math.PI * 2;
              e.wanderTimer = 0.45 + Math.random() * 1.1;
            }
            const ex = e.x + Math.cos(e.wanderAngle) * enemyWanderSpeed * moveMul * 0.55 * dt;
            const ey = e.y + Math.sin(e.wanderAngle) * enemyWanderSpeed * moveMul * 0.55 * dt;
            if (canMove(ex, e.y, 0.2)) e.x = ex;
            if (canMove(e.x, ey, 0.2)) e.y = ey;
          }

          if (d < 12 && d > 1.8 && e.shootTimer <= 0) {
            const isLightning = e.kind === "lightning";
            const isPoison = e.kind === "poison";
            enemyProjectiles.push({
              x: e.x,
              y: e.y,
              a: Math.atan2(vy, vx) + (Math.random() - 0.5) * (isLightning ? 0.03 : isPoison ? 0.06 : 0.08),
              speed: (isLightning ? 6.9 : isPoison ? 4.9 : 4.3) * (1 + (dungeonLevel - 1) * 0.08),
              life: isLightning ? 1.6 : isPoison ? 2.1 : 2.4,
              damage: Math.round((isLightning ? 16 : isPoison ? 14 : 13) * diff),
              size: isLightning ? 0.23 : isPoison ? 0.26 : 0.27,
              type: isLightning ? "lightning" : isPoison ? "poison" : "flame"
            });
            e.shootTimer = (isLightning ? 0.72 : isPoison ? 0.86 : 0.95) + Math.random() * (isLightning ? 0.95 : 1.05);
          }
          if (d <= 0.78) dealDamageToPlayer(def.touchDps * diff * dt);
        } else if (e.kind === "stalker") {
          e.chargeTimer -= dt;
          if (d <= enemyAggroRange + 1.7 && d > 0.68) {
            const dash = e.chargeTimer <= 0 ? 1.95 : 1;
            if (dash > 1) e.chargeTimer = 0.9 + Math.random() * 1.5;
            const ex = e.x + (vx / d) * enemySpeed * moveMul * dash * dt;
            const ey = e.y + (vy / d) * enemySpeed * moveMul * dash * dt;
            if (canMove(ex, e.y, 0.2)) e.x = ex;
            if (canMove(e.x, ey, 0.2)) e.y = ey;
          } else if (d <= 0.68) {
            dealDamageToPlayer(def.touchDps * diff * dt);
          } else {
            e.wanderTimer -= dt;
            if (e.wanderTimer <= 0) {
              e.wanderAngle = Math.random() * Math.PI * 2;
              e.wanderTimer = 0.5 + Math.random() * 1.1;
            }
            const ex = e.x + Math.cos(e.wanderAngle) * enemyWanderSpeed * moveMul * dt;
            const ey = e.y + Math.sin(e.wanderAngle) * enemyWanderSpeed * moveMul * dt;
            if (canMove(ex, e.y, 0.2)) e.x = ex;
            if (canMove(e.x, ey, 0.2)) e.y = ey;
          }
        } else if (e.kind === "brute") {
          if (d <= enemyAggroRange + 0.8 && d > 0.74) {
            const ex = e.x + (vx / d) * enemySpeed * moveMul * 0.85 * dt;
            const ey = e.y + (vy / d) * enemySpeed * moveMul * 0.85 * dt;
            if (canMove(ex, e.y, 0.24)) e.x = ex;
            if (canMove(e.x, ey, 0.24)) e.y = ey;
          } else if (d <= 0.74) {
            dealDamageToPlayer(def.touchDps * diff * dt);
          }
        } else if (d <= enemyAggroRange && d > 0.7) {
          const ex = e.x + (vx / d) * enemySpeed * moveMul * dt;
          const ey = e.y + (vy / d) * enemySpeed * moveMul * dt;
          if (canMove(ex, e.y, 0.2)) e.x = ex;
          else e.wanderAngle = Math.random() * Math.PI * 2;
          if (canMove(e.x, ey, 0.2)) e.y = ey;
          else e.wanderAngle = Math.random() * Math.PI * 2;
        } else if (d <= 0.7) {
          dealDamageToPlayer(def.touchDps * diff * dt);
        } else {
          e.wanderTimer -= dt;
          if (e.wanderTimer <= 0) {
            e.wanderAngle = Math.random() * Math.PI * 2;
            e.wanderTimer = 0.7 + Math.random() * 2.1;
          }
          e.wanderAngle += (Math.random() - 0.5) * 0.9 * dt;
          const ex = e.x + Math.cos(e.wanderAngle) * enemyWanderSpeed * moveMul * dt;
          const ey = e.y + Math.sin(e.wanderAngle) * enemyWanderSpeed * moveMul * dt;
          if (canMove(ex, e.y, 0.2)) e.x = ex;
          else e.wanderAngle += Math.PI * (0.4 + Math.random() * 0.3);
          if (canMove(e.x, ey, 0.2)) e.y = ey;
          else e.wanderAngle -= Math.PI * (0.3 + Math.random() * 0.35);
        }
      }

      for (const b of bullets) {
        b.life -= dt;
        b.x += Math.cos(b.a) * b.speed * dt;
        b.y += Math.sin(b.a) * b.speed * dt;
        if (isWall(b.x, b.y)) b.life = -1;
        for (const e of enemies) {
          if (e.hp <= 0) continue;
          if (Math.hypot(e.x - b.x, e.y - b.y) < (b.hitRadius || 0.32)) {
            const dmg = b.damage || 25;
            const hitDamage = Math.min(dmg, e.hp);
            e.hp -= dmg;
            e.hurt = 1;
            if (player.enemySlowPower > 0) e.slowTimer = Math.max(e.slowTimer, 0.8);
            player.hp = Math.min(player.maxHp, player.hp + hitDamage * (baseLifestealRatio + player.lifestealBonus));
            if (e.hp <= 0) {
              gainXp((enemyDefs[e.kind] || enemyDefs.melee).xp);
            }
            b.life = -1;
            break;
          }
        }
      }
      for (let i = bullets.length - 1; i >= 0; i--) {
        if (bullets[i].life <= 0) bullets.splice(i, 1);
      }
      for (const p of enemyProjectiles) {
        p.life -= dt;
        p.x += Math.cos(p.a) * p.speed * dt;
        p.y += Math.sin(p.a) * p.speed * dt;
        if (isWall(p.x, p.y)) {
          p.life = -1;
          continue;
        }
        if (Math.hypot(player.x - p.x, player.y - p.y) < 0.38) {
          dealDamageToPlayer(p.damage);
          p.life = -1;
        }
      }
      for (let i = enemyProjectiles.length - 1; i >= 0; i--) {
        if (enemyProjectiles[i].life <= 0) enemyProjectiles.splice(i, 1);
      }

      player.hp = Math.max(0, player.hp);
      if (player.hp <= 0) gameState = "lost";
      const collected = milks.filter(m => m.taken).length;
      if (collected === totalMilk && !stairs.active) placeStairs();
      if (stairs.active && Math.hypot(player.x - stairs.x, player.y - stairs.y) < 0.62) {
        advanceFloor();
      }
    }

    function drawBackground() {
      const w = canvas.width;
      const h = canvas.height;
      const roof = ctx.createLinearGradient(0, 0, 0, h / 2);
      roof.addColorStop(0, "#4b2f1c");
      roof.addColorStop(1, "#2f1a0f");
      ctx.fillStyle = roof;
      ctx.fillRect(0, 0, w, h / 2);
      const plankW = Math.max(28, w / 26);
      for (let x = 0; x < w; x += plankW) {
        const tint = ((Math.floor(x / plankW) % 2) === 0) ? 1.08 : 0.88;
        const r = Math.max(0, Math.min(255, (70 * tint) | 0));
        const g = Math.max(0, Math.min(255, (42 * tint) | 0));
        const b = Math.max(0, Math.min(255, (25 * tint) | 0));
        ctx.fillStyle = `rgb(${r},${g},${b})`;
        ctx.fillRect(x, 0, plankW - 2, h / 2);
      }
      ctx.fillStyle = "rgba(20, 10, 6, 0.35)";
      for (let y = 14; y < h / 2; y += 26) {
        ctx.fillRect(0, y, w, 2);
      }

      const floor = ctx.createLinearGradient(0, h / 2, 0, h);
      floor.addColorStop(0, "#171717");
      floor.addColorStop(1, "#050505");
      ctx.fillStyle = floor;
      ctx.fillRect(0, h / 2, w, h / 2);
    }

    function drawWorld() {
      const w = canvas.width;
      const h = canvas.height;
      const zBuffer = new Array(rayCount).fill(maxDist);

      for (let i = 0; i < rayCount; i++) {
        const t = i / rayCount;
        const angle = player.a - fov / 2 + t * fov;
        const hit = raycast(player.x, player.y, angle);
        const dist = hit.dist * Math.cos(angle - player.a);
        zBuffer[i] = dist;
        const wallH = Math.min(h, (h * 0.85) / Math.max(0.001, dist));
        const x = (i / rayCount) * w;
        const bw = w / rayCount + 1;
        const top = (h - wallH) / 2;

        const fracX = hit.hitX - Math.floor(hit.hitX);
        const fracY = hit.hitY - Math.floor(hit.hitY);
        const texU = Math.abs(fracX - 0.5) > Math.abs(fracY - 0.5) ? fracY : fracX;
        const section = ((Math.floor(hit.cellX / 4) + Math.floor(hit.cellY / 4)) % 3 + 3) % 3;
        const baseBrick = [
          [92, 82, 74],
          [84, 78, 72],
          [100, 88, 78]
        ][section];
        const distShade = Math.max(0.18, 1 - dist * 0.06);
        const brickAlt = (Math.floor((texU + (hit.cellY % 2 ? 0.2 : 0)) * 8) % 2 === 0) ? 1.05 : 0.85;

        let r = baseBrick[0] * distShade * brickAlt;
        let g = baseBrick[1] * distShade * brickAlt;
        let b = baseBrick[2] * distShade * brickAlt;
        ctx.fillStyle = `rgb(${r | 0}, ${g | 0}, ${b | 0})`;
        ctx.fillRect(x, top, bw, wallH);

        ctx.fillStyle = "rgba(32, 24, 20, 0.45)";
        for (let row = 1; row <= 5; row++) {
          const mortarY = top + (row / 6) * wallH + ((hit.cellX + hit.cellY + row) % 2);
          ctx.fillRect(x, mortarY, bw, Math.max(1, wallH * 0.01));
        }
        const joints = [0, 0.25, 0.5, 0.75, 1];
        if (joints.some(j => Math.abs(texU - j) < 0.028)) {
          ctx.fillStyle = "rgba(28, 22, 18, 0.55)";
          ctx.fillRect(x, top, bw, wallH);
        }
      }

      const sprites = [];
      for (const m of milks) {
        if (!m.taken) sprites.push({ ...m, type: "milk" });
      }
      for (const a of ammoCrates) {
        if (!a.taken) sprites.push({ ...a, type: "ammo" });
      }
      if (stairs.active) sprites.push({ ...stairs, type: "stairs" });
      for (const b of bullets) {
        if (b.life > 0) sprites.push({ ...b, type: "pbullet", btype: b.type || "normal" });
      }
      for (const p of enemyProjectiles) {
        if (p.life > 0) {
          sprites.push({
            ...p,
            type: p.type === "lightning" ? "lball" : p.type === "poison" ? "pball" : "fball"
          });
        }
      }
      for (const e of enemies) {
        if (e.hp > 0) sprites.push({ ...e, type: "enemy", hurt: e.hurt, kind: e.kind });
      }

      sprites.sort((a, b) => {
        const da = Math.hypot(a.x - player.x, a.y - player.y);
        const db = Math.hypot(b.x - player.x, b.y - player.y);
        return db - da;
      });

      for (const s of sprites) {
        const dx = s.x - player.x;
        const dy = s.y - player.y;
        const dist = Math.hypot(dx, dy);
        const angle = Math.atan2(dy, dx) - player.a;
        const wrapped = Math.atan2(Math.sin(angle), Math.cos(angle));
        if (Math.abs(wrapped) > fov * 0.6) continue;

        const screenX = (wrapped / fov + 0.5) * w;
        const spriteScale = s.type === "enemy" ? 0.55 : s.type === "ammo" ? 0.34 : s.type === "milk" ? 0.40 : s.type === "stairs" ? 0.40 : 0.12;
        const size = Math.min(h * 0.9, (h * spriteScale) / Math.max(dist, 0.1));
        const left = screenX - size / 2;
        const top = h / 2 - size / 2;
        const rayIndex = Math.floor((screenX / w) * rayCount);
        if (rayIndex < 0 || rayIndex >= rayCount || dist > zBuffer[rayIndex]) continue;

        if (s.type === "milk") drawMilkSprite(left, top, size);
        else if (s.type === "ammo") drawAmmoCrateSprite(left, top, size);
        else if (s.type === "stairs") drawStairsSprite(left, top, size);
        else if (s.type === "enemy") drawEnemySprite(left, top, size, s.hurt, s.kind);
        else if (s.type === "fball") drawFlameBallSprite(left, top, size);
        else if (s.type === "lball") drawLightningBallSprite(left, top, size);
        else if (s.type === "pball") drawPoisonBallSprite(left, top, size);
        else drawPlayerBulletSprite(left, top, size, s.btype);
      }

      ctx.strokeStyle = "#cbd5e1";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(w / 2 - 10, h / 2);
      ctx.lineTo(w / 2 + 10, h / 2);
      ctx.moveTo(w / 2, h / 2 - 10);
      ctx.lineTo(w / 2, h / 2 + 10);
      ctx.stroke();
    }

    function drawMilkSprite(left, top, size) {
      const frontX = left + size * 0.08;
      const frontY = top + size * 0.10;
      const frontW = size * 0.58;
      const frontH = size * 0.84;
      const depth = size * 0.20;
      const topLift = size * 0.12;

      ctx.fillStyle = "#78b8ff";
      ctx.beginPath();
      ctx.moveTo(frontX, frontY);
      ctx.lineTo(frontX + depth, frontY - topLift);
      ctx.lineTo(frontX + depth + frontW, frontY - topLift);
      ctx.lineTo(frontX + frontW, frontY);
      ctx.closePath();
      ctx.fill();

      const frontGrad = ctx.createLinearGradient(frontX, frontY, frontX, frontY + frontH);
      frontGrad.addColorStop(0, "#ffffff");
      frontGrad.addColorStop(0.58, "#d7f1ff");
      frontGrad.addColorStop(1, "#8ec5ff");
      ctx.fillStyle = frontGrad;
      ctx.fillRect(frontX, frontY, frontW, frontH);

      const sideGrad = ctx.createLinearGradient(frontX + frontW, frontY, frontX + frontW + depth, frontY + frontH);
      sideGrad.addColorStop(0, "#4fa3ff");
      sideGrad.addColorStop(1, "#1f5fae");
      ctx.fillStyle = sideGrad;
      ctx.beginPath();
      ctx.moveTo(frontX + frontW, frontY);
      ctx.lineTo(frontX + frontW + depth, frontY - topLift);
      ctx.lineTo(frontX + frontW + depth, frontY + frontH - topLift);
      ctx.lineTo(frontX + frontW, frontY + frontH);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#1f6ad3";
      ctx.fillRect(frontX + frontW * 0.16, frontY + frontH * 0.22, frontW * 0.66, frontH * 0.46);
      ctx.fillStyle = "#94d6ff";
      ctx.fillRect(frontX + frontW * 0.24, frontY + frontH * 0.30, frontW * 0.22, frontH * 0.12);

      ctx.strokeStyle = "rgba(15, 23, 42, 0.82)";
      ctx.lineWidth = Math.max(1.2, size * 0.02);
      ctx.strokeRect(frontX, frontY, frontW, frontH);
      ctx.beginPath();
      ctx.moveTo(frontX + frontW, frontY);
      ctx.lineTo(frontX + frontW + depth, frontY - topLift);
      ctx.lineTo(frontX + frontW + depth, frontY + frontH - topLift);
      ctx.lineTo(frontX + frontW, frontY + frontH);
      ctx.stroke();
    }

    function drawAmmoCrateSprite(left, top, size) {
      const cx = left + size * 0.12;
      const cy = top + size * 0.18;
      const cw = size * 0.58;
      const ch = size * 0.58;
      const d = size * 0.20;
      const rise = size * 0.12;

      ctx.fillStyle = "#b45309";
      ctx.fillRect(cx, cy, cw, ch);

      ctx.fillStyle = "#d97706";
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(cx + d, cy - rise);
      ctx.lineTo(cx + d + cw, cy - rise);
      ctx.lineTo(cx + cw, cy);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#92400e";
      ctx.beginPath();
      ctx.moveTo(cx + cw, cy);
      ctx.lineTo(cx + cw + d, cy - rise);
      ctx.lineTo(cx + cw + d, cy + ch - rise);
      ctx.lineTo(cx + cw, cy + ch);
      ctx.closePath();
      ctx.fill();

      ctx.fillStyle = "#fde68a";
      ctx.fillRect(cx + cw * 0.30, cy + ch * 0.20, cw * 0.40, ch * 0.50);
      ctx.fillStyle = "#78350f";
      ctx.fillRect(cx + cw * 0.43, cy + ch * 0.26, cw * 0.14, ch * 0.38);
      ctx.fillRect(cx + cw * 0.34, cy + ch * 0.37, cw * 0.32, ch * 0.14);

      ctx.strokeStyle = "rgba(15, 23, 42, 0.82)";
      ctx.lineWidth = Math.max(1.1, size * 0.019);
      ctx.strokeRect(cx, cy, cw, ch);
    }

    function drawEnemySprite(left, top, size, hurt, kind = "melee") {
      const bodyW = size * 0.82;
      const bodyH = size;
      const bodyX = left;
      const bodyY = top;

      const palette = {
        melee: ["#8a947d", "#4f5d48", "#7b8e73"],
        stalker: ["#8b77a8", "#4b3b63", "#cebaf0"],
        brute: ["#8d6b4b", "#4d341f", "#cfb08d"],
        flame: ["#cf7d45", "#7b3f24", "#ffd1a8"],
        lightning: ["#65a9d6", "#28527b", "#d6f1ff"],
        poison: ["#4ca768", "#245c36", "#ccf6d2"]
      };
      const p = palette[kind] || palette.melee;
      const body = ctx.createLinearGradient(bodyX, bodyY, bodyX, bodyY + bodyH);
      if (hurt > 0) {
        body.addColorStop(0, "#c78186");
        body.addColorStop(1, "#7f474b");
      } else {
        body.addColorStop(0, p[0]);
        body.addColorStop(1, p[1]);
      }

      ctx.fillStyle = "rgba(2, 6, 14, 0.35)";
      ctx.beginPath();
      ctx.ellipse(bodyX + bodyW * 0.54, bodyY + bodyH * 1.02, bodyW * 0.58, bodyH * 0.12, 0, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = body;
      ctx.fillRect(bodyX, bodyY, bodyW, bodyH);

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(bodyX + bodyW * 0.16, bodyY + bodyH * 0.2, bodyW * 0.19, bodyH * 0.15);
      ctx.fillRect(bodyX + bodyW * 0.58, bodyY + bodyH * 0.2, bodyW * 0.19, bodyH * 0.15);
      ctx.fillStyle = hurt > 0 ? "#fce7ea" : p[2];
      ctx.fillRect(bodyX + bodyW * 0.21, bodyY + bodyH * 0.25, bodyW * 0.08, bodyH * 0.05);
      ctx.fillRect(bodyX + bodyW * 0.63, bodyY + bodyH * 0.25, bodyW * 0.08, bodyH * 0.05);

      ctx.fillStyle = "#111827";
      ctx.fillRect(bodyX + bodyW * 0.26, bodyY + bodyH * 0.52, bodyW * 0.32, bodyH * 0.1);
      ctx.fillStyle = kind === "poison" ? "#6ee7b7" : "#e5d1c0";
      ctx.fillRect(bodyX + bodyW * 0.34, bodyY + bodyH * 0.57, bodyW * 0.15, bodyH * 0.03);

      ctx.fillStyle = hurt > 0 ? "#b75f66" : p[1];
      ctx.fillRect(bodyX - bodyW * 0.08, bodyY + bodyH * 0.38, bodyW * 0.08, bodyH * 0.36);
      ctx.fillRect(bodyX + bodyW, bodyY + bodyH * 0.38, bodyW * 0.08, bodyH * 0.36);

      if (kind === "flame") {
        ctx.fillStyle = "#ffd199";
        ctx.beginPath();
        ctx.moveTo(bodyX + bodyW * 0.5, bodyY + bodyH * 0.40);
        ctx.lineTo(bodyX + bodyW * 0.61, bodyY + bodyH * 0.56);
        ctx.lineTo(bodyX + bodyW * 0.50, bodyY + bodyH * 0.52);
        ctx.lineTo(bodyX + bodyW * 0.41, bodyY + bodyH * 0.60);
        ctx.closePath();
        ctx.fill();
      } else if (kind === "lightning") {
        ctx.strokeStyle = "#c8ecff";
        ctx.lineWidth = Math.max(1.2, size * 0.024);
        ctx.beginPath();
        ctx.moveTo(bodyX + bodyW * 0.29, bodyY + bodyH * 0.40);
        ctx.lineTo(bodyX + bodyW * 0.44, bodyY + bodyH * 0.52);
        ctx.lineTo(bodyX + bodyW * 0.39, bodyY + bodyH * 0.63);
        ctx.lineTo(bodyX + bodyW * 0.56, bodyY + bodyH * 0.80);
        ctx.stroke();
      } else if (kind === "poison") {
        ctx.fillStyle = "#a7f3d0";
        ctx.beginPath();
        ctx.arc(bodyX + bodyW * 0.51, bodyY + bodyH * 0.45, bodyW * 0.09, 0, Math.PI * 2);
        ctx.fill();
      } else if (kind === "brute") {
        ctx.fillStyle = "#d6bfa4";
        ctx.fillRect(bodyX + bodyW * 0.16, bodyY + bodyH * 0.03, bodyW * 0.10, bodyH * 0.17);
        ctx.fillRect(bodyX + bodyW * 0.68, bodyY + bodyH * 0.03, bodyW * 0.10, bodyH * 0.17);
      } else if (kind === "stalker") {
        ctx.strokeStyle = "#d8c6ff";
        ctx.lineWidth = Math.max(1, size * 0.018);
        ctx.beginPath();
        ctx.moveTo(bodyX + bodyW * 0.18, bodyY + bodyH * 0.85);
        ctx.lineTo(bodyX + bodyW * 0.33, bodyY + bodyH * 0.74);
        ctx.lineTo(bodyX + bodyW * 0.46, bodyY + bodyH * 0.84);
        ctx.stroke();
      }

      ctx.strokeStyle = "rgba(3, 7, 18, 0.86)";
      ctx.lineWidth = Math.max(1.3, size * 0.02);
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
    }

    function drawPlayerBulletSprite(left, top, size, btype = "normal") {
      const cx = left + size * 0.5;
      const cy = top + size * 0.5;
      const r = Math.max(1.5, size * 0.25);
      const g = ctx.createRadialGradient(cx, cy, r * 0.15, cx, cy, r);
      if (btype === "fire") {
        g.addColorStop(0, "rgba(255, 238, 180, 0.96)");
        g.addColorStop(0.65, "rgba(248, 130, 48, 0.82)");
        g.addColorStop(1, "rgba(128, 44, 20, 0.22)");
      } else {
        g.addColorStop(0, "rgba(220, 235, 255, 0.95)");
        g.addColorStop(1, "rgba(125, 160, 210, 0.20)");
      }
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawFlameBallSprite(left, top, size) {
      const cx = left + size * 0.5;
      const cy = top + size * 0.5;
      const r = Math.max(2.5, size * 0.45);
      const outer = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, r);
      outer.addColorStop(0, "rgba(255, 220, 150, 0.95)");
      outer.addColorStop(0.55, "rgba(245, 130, 50, 0.80)");
      outer.addColorStop(1, "rgba(130, 45, 20, 0.25)");
      ctx.fillStyle = outer;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(255, 245, 210, 0.72)";
      ctx.beginPath();
      ctx.arc(cx - r * 0.18, cy - r * 0.20, r * 0.30, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawLightningBallSprite(left, top, size) {
      const cx = left + size * 0.5;
      const cy = top + size * 0.5;
      const r = Math.max(2, size * 0.42);
      const g = ctx.createRadialGradient(cx, cy, r * 0.15, cx, cy, r);
      g.addColorStop(0, "rgba(230, 248, 255, 0.95)");
      g.addColorStop(0.6, "rgba(120, 205, 255, 0.82)");
      g.addColorStop(1, "rgba(40, 90, 180, 0.2)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "rgba(210, 240, 255, 0.78)";
      ctx.lineWidth = Math.max(1, size * 0.08);
      ctx.beginPath();
      ctx.moveTo(cx - r * 0.3, cy - r * 0.5);
      ctx.lineTo(cx + r * 0.1, cy - r * 0.1);
      ctx.lineTo(cx - r * 0.1, cy + r * 0.15);
      ctx.lineTo(cx + r * 0.35, cy + r * 0.45);
      ctx.stroke();
    }

    function drawPoisonBallSprite(left, top, size) {
      const cx = left + size * 0.5;
      const cy = top + size * 0.5;
      const r = Math.max(2, size * 0.43);
      const g = ctx.createRadialGradient(cx, cy, r * 0.15, cx, cy, r);
      g.addColorStop(0, "rgba(220, 255, 226, 0.95)");
      g.addColorStop(0.6, "rgba(90, 210, 126, 0.82)");
      g.addColorStop(1, "rgba(28, 108, 58, 0.20)");
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(cx, cy, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = "rgba(214, 255, 220, 0.86)";
      ctx.beginPath();
      ctx.arc(cx - r * 0.16, cy - r * 0.16, r * 0.24, 0, Math.PI * 2);
      ctx.fill();
    }

    function drawStairsSprite(left, top, size) {
      const w = size * 0.9;
      const h = size * 0.55;
      const x = left + size * 0.05;
      const y = top + size * 0.30;
      ctx.fillStyle = "#57606f";
      ctx.fillRect(x, y, w, h);
      const steps = 5;
      for (let i = 0; i < steps; i++) {
        const sy = y + (i / steps) * h;
        ctx.fillStyle = i % 2 ? "#7b8494" : "#656f7e";
        ctx.fillRect(x + (i / steps) * w * 0.2, sy, w - (i / steps) * w * 0.2, h / steps - 1);
      }
      ctx.strokeStyle = "rgba(15, 23, 42, 0.8)";
      ctx.lineWidth = Math.max(1.2, size * 0.02);
      ctx.strokeRect(x, y, w, h);
    }

    function drawWeapon(timeSec) {
      const w = canvas.width;
      const h = canvas.height;
      const sway = Math.sin(timeSec * 4.0) * 3 + Math.cos(timeSec * 1.9) * 1.5;
      const recoil = player.shootCooldown > 0 ? player.shootCooldown * 28 : 0;
      const gunW = w * 0.40;
      const gunH = h * 0.28;
      const gunX = w * 0.5 - gunW * 0.5 + sway;
      const gunY = h - gunH + 40 + recoil;
      const wp = weaponDefs[player.weaponIndex];

      function steel(x, y, ww, hh, a = "#6c737a", b = "#2f353b") {
        const g = ctx.createLinearGradient(x, y, x, y + hh);
        g.addColorStop(0, a);
        g.addColorStop(1, b);
        ctx.fillStyle = g;
        ctx.fillRect(x, y, ww, hh);
      }

      function wood(x, y, ww, hh) {
        const g = ctx.createLinearGradient(x, y, x, y + hh);
        g.addColorStop(0, "#5b4532");
        g.addColorStop(1, "#312417");
        ctx.fillStyle = g;
        ctx.fillRect(x, y, ww, hh);
      }

      const bodyW = wp.id === "shotgun" ? gunW * 0.26 : wp.id === "sniper" ? gunW * 0.20 : gunW * 0.24;
      const bodyH = gunH * 0.54;
      const bodyX = gunX + gunW * 0.5 - bodyW * 0.5;
      const bodyY = gunY + gunH * 0.36;
      const barrelW = wp.id === "sniper" ? bodyW * 0.20 : wp.id === "shotgun" ? bodyW * 0.30 : bodyW * 0.24;
      const barrelH = wp.id === "sniper" ? gunH * 0.70 : wp.id === "shotgun" ? gunH * 0.52 : gunH * 0.60;
      const barrelX = gunX + gunW * 0.5 - barrelW * 0.5;
      const barrelY = gunY - barrelH * 0.58;

      if (wp.id === "shotgun") wood(bodyX, bodyY, bodyW, bodyH);
      else steel(bodyX, bodyY, bodyW, bodyH, "#747b83", "#353b42");
      steel(barrelX, barrelY, barrelW, barrelH, "#808890", "#333a42");

      if (wp.id === "sniper") {
        steel(gunX + gunW * 0.5 - bodyW * 0.55, gunY + gunH * 0.27, bodyW * 1.1, gunH * 0.12, "#7b838c", "#373d45");
        ctx.fillStyle = "#101419";
        ctx.fillRect(gunX + gunW * 0.5 - bodyW * 0.18, gunY + gunH * 0.29, bodyW * 0.36, gunH * 0.08);
      }
      if (wp.id === "smg") {
        steel(gunX + gunW * 0.5 - bodyW * 0.60, gunY + gunH * 0.43, bodyW * 1.2, gunH * 0.09, "#707880", "#323840");
      }
      if (wp.id === "rifle") {
        wood(gunX + gunW * 0.5 - bodyW * 0.62, gunY + gunH * 0.51, bodyW * 1.24, gunH * 0.10);
      }

      ctx.fillStyle = "#20262c";
      ctx.fillRect(gunX + gunW * 0.5 - bodyW * 0.28, gunY + gunH * 0.56, bodyW * 0.56, gunH * 0.30);
      ctx.fillStyle = "#13181d";
      ctx.fillRect(gunX + gunW * 0.5 - bodyW * 0.18, gunY + gunH * 0.62, bodyW * 0.36, gunH * 0.20);
      ctx.fillStyle = "#0f1216";
      ctx.fillRect(gunX + gunW * 0.5 - bodyW * 0.09, gunY + gunH * 0.08, bodyW * 0.18, gunH * 0.03);
      ctx.strokeStyle = "rgba(205, 213, 221, 0.26)";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bodyX, bodyY, bodyW, bodyH);
      ctx.strokeRect(barrelX, barrelY, barrelW, barrelH);

      if (player.muzzleFlash > 0) {
        const f = player.muzzleFlash / Math.max(0.01, wp.muzzle);
        const fx = gunX + gunW * 0.5;
        const fy = barrelY - gunH * 0.03;
        ctx.fillStyle = `rgba(240, 220, 150, ${0.36 * f})`;
        ctx.beginPath();
        ctx.moveTo(fx, fy - 18 * f);
        ctx.lineTo(fx + 12 * f, fy + 2 * f);
        ctx.lineTo(fx, fy + 9 * f);
        ctx.lineTo(fx - 12 * f, fy + 2 * f);
        ctx.closePath();
        ctx.fill();
      }
    }

    function drawMinimap() {
      const cell = Math.max(3, Math.min(8, Math.floor(Math.min(canvas.width, canvas.height) / 130)));
      const pad = 10;
      const w = worldW * cell;
      const h = worldH * cell;
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = "#0b1220";
      ctx.fillRect(pad - 4, pad - 4, w + 8, h + 8);
      ctx.globalAlpha = 1;

      for (let y = 0; y < worldH; y++) {
        for (let x = 0; x < worldW; x++) {
          ctx.fillStyle = wallGrid[y][x] ? "#5d534b" : "#111317";
          ctx.fillRect(pad + x * cell, pad + y * cell, cell - 1, cell - 1);
        }
      }
      for (const m of milks) {
        if (!m.taken) {
          const mx = pad + m.x * cell;
          const my = pad + m.y * cell;
          ctx.fillStyle = "#60a5fa";
          ctx.fillRect(mx - 1.8, my - 1.6, 3.6, 3.2);
          ctx.fillStyle = "#e0f2fe";
          ctx.fillRect(mx - 0.8, my - 0.7, 1.6, 1.4);
        }
      }
      for (const crate of ammoCrates) {
        if (!crate.taken) {
          const cx = pad + crate.x * cell;
          const cy = pad + crate.y * cell;
          ctx.fillStyle = "#f59e0b";
          ctx.fillRect(cx - 1.7, cy - 1.7, 3.4, 3.4);
          ctx.fillStyle = "#78350f";
          ctx.fillRect(cx - 0.55, cy - 1.2, 1.1, 2.4);
          ctx.fillRect(cx - 1.2, cy - 0.55, 2.4, 1.1);
        }
      }
      if (stairs.active) {
        const sx = pad + stairs.x * cell;
        const sy = pad + stairs.y * cell;
        ctx.fillStyle = "#94a3b8";
        ctx.fillRect(sx - 2.2, sy - 2.2, 4.4, 4.4);
        ctx.fillStyle = "#e2e8f0";
        ctx.fillRect(sx - 1.5, sy - 1.5, 3.0, 0.8);
        ctx.fillRect(sx - 0.8, sy - 0.3, 2.3, 0.8);
        ctx.fillRect(sx - 0.1, sy + 0.9, 1.6, 0.8);
      }
      for (const e of enemies) {
        if (e.hp > 0) {
          const ex = pad + e.x * cell;
          const ey = pad + e.y * cell;
          const enemyColor = {
            melee: "#ef4444",
            stalker: "#c084fc",
            brute: "#f59e0b",
            flame: "#f97316",
            lightning: "#60a5fa",
            poison: "#4ade80"
          };
          ctx.fillStyle = enemyColor[e.kind] || "#ef4444";
          ctx.beginPath();
          ctx.arc(ex, ey, 2.4, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "#111827";
          ctx.fillRect(ex - 1.2, ey - 1.2, 0.9, 0.9);
          ctx.fillRect(ex + 0.3, ey - 1.2, 0.9, 0.9);
        }
      }
      ctx.fillStyle = "#f8fafc";
      ctx.beginPath();
      ctx.arc(pad + player.x * cell, pad + player.y * cell, 2.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = "#f8fafc";
      ctx.beginPath();
      ctx.moveTo(pad + player.x * cell, pad + player.y * cell);
      ctx.lineTo(
        pad + (player.x + Math.cos(player.a) * 1.2) * cell,
        pad + (player.y + Math.sin(player.a) * 1.2) * cell
      );
      ctx.stroke();
    }

    function drawOverlay() {
      if (gameState === "playing" && !choosingSkill) return;
      if (choosingSkill) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        const panelW = Math.min(canvas.width * 0.94, 980);
        const panelH = Math.min(canvas.height * 0.9, 650);
        const panelX = (canvas.width - panelW) / 2;
        const panelY = (canvas.height - panelH) / 2;
        ctx.fillStyle = "rgba(7, 12, 22, 0.90)";
        ctx.fillRect(panelX, panelY, panelW, panelH);
        ctx.strokeStyle = "rgba(148, 163, 184, 0.55)";
        ctx.lineWidth = 2;
        ctx.strokeRect(panelX, panelY, panelW, panelH);

        ctx.textAlign = "center";
        ctx.fillStyle = "#e5e7eb";
        ctx.font = "bold 38px Trebuchet MS";
        ctx.fillText("Level Up Skill Tree", canvas.width / 2, panelY + 54);
        ctx.font = "18px Trebuchet MS";
        ctx.fillStyle = "#a5b4fc";
        ctx.fillText("Pick one highlighted node. Locked nodes need their parent first.", canvas.width / 2, panelY + 82);

        const nodeR = Math.max(34, Math.min(54, panelW * 0.047));
        const colW = panelW / 3.2;
        const rowH = (panelH - 220) / 2.2;
        const nodePos = new Map();
        const pickIndexById = new Map(selectableSkills.map((s, i) => [s.id, i]));
        for (const s of skillTree) {
          nodePos.set(s.id, {
            x: panelX + panelW * 0.18 + s.col * colW,
            y: panelY + 156 + s.row * rowH
          });
        }

        ctx.lineWidth = 3;
        for (const s of skillTree) {
          const to = nodePos.get(s.id);
          for (const req of s.requires) {
            const from = nodePos.get(req);
            if (!from) continue;
            const lit = hasSkill(req) && (hasSkill(s.id) || pickIndexById.has(s.id));
            ctx.strokeStyle = lit ? "rgba(99, 229, 255, 0.75)" : "rgba(100, 116, 139, 0.35)";
            ctx.beginPath();
            ctx.moveTo(from.x, from.y + nodeR * 0.72);
            ctx.lineTo(to.x, to.y - nodeR * 0.72);
            ctx.stroke();
          }
        }

        for (const s of skillTree) {
          const p = nodePos.get(s.id);
          const owned = hasSkill(s.id);
          const pickIdx = pickIndexById.get(s.id);
          const available = typeof pickIdx === "number";
          const locked = !owned && !available;
          const base = owned ? "#22c55e" : available ? "#38bdf8" : "#64748b";
          const border = owned ? "#bbf7d0" : available ? "#bae6fd" : "#475569";

          ctx.fillStyle = base;
          ctx.beginPath();
          ctx.arc(p.x, p.y, nodeR, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = border;
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.fillStyle = locked ? "#cbd5e1" : "#ffffff";
          ctx.font = `bold ${Math.round(nodeR * 0.54)}px Trebuchet MS`;
          ctx.fillText(s.icon, p.x, p.y + 7);

          if (available) {
            ctx.fillStyle = "#f59e0b";
            ctx.fillRect(p.x + nodeR * 0.45, p.y - nodeR * 0.95, nodeR * 0.74, nodeR * 0.50);
            ctx.fillStyle = "#111827";
            ctx.font = `bold ${Math.round(nodeR * 0.34)}px Trebuchet MS`;
            ctx.fillText(`${pickIdx + 1}`, p.x + nodeR * 0.82, p.y - nodeR * 0.58);
          }

          ctx.font = "bold 15px Trebuchet MS";
          ctx.fillStyle = owned ? "#dcfce7" : available ? "#e0f2fe" : "#94a3b8";
          ctx.fillText(s.label, p.x, p.y + nodeR + 22);
        }

        ctx.textAlign = "left";
        ctx.font = "16px Trebuchet MS";
        ctx.fillStyle = "#e2e8f0";
        ctx.fillText("Available picks:", panelX + 28, panelY + panelH - 84);
        ctx.font = "15px Trebuchet MS";
        for (let i = 0; i < selectableSkills.length; i++) {
          const s = selectableSkills[i];
          const col = i < 3 ? 0 : 1;
          const row = i % 3;
          const tx = panelX + 28 + col * (panelW * 0.48);
          const ty = panelY + panelH - 58 + row * 20;
          ctx.fillStyle = "#cbd5e1";
          ctx.fillText(`${i + 1}. ${s.label} - ${s.desc}`, tx, ty);
        }
        return;
      }
      ctx.fillStyle = "rgba(0, 0, 0, 0.58)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.textAlign = "center";
      ctx.fillStyle = "#f8fafc";
      ctx.font = "bold 52px Trebuchet MS";
      ctx.fillText("You got shredded!", canvas.width / 2, canvas.height / 2 - 10);
      ctx.font = "24px Trebuchet MS";
      ctx.fillStyle = "#cbd5e1";
      ctx.fillText("Refresh page to play again", canvas.width / 2, canvas.height / 2 + 36);
    }

    function drawStatBar(x, y, w, h, value, maxValue, color, label, icon) {
      const p = maxValue <= 0 ? 0 : Math.max(0, Math.min(1, value / maxValue));
      ctx.fillStyle = "rgba(10, 14, 22, 0.52)";
      ctx.fillRect(x, y, w, h);
      ctx.fillStyle = color;
      ctx.fillRect(x + 2, y + 2, (w - 4) * p, h - 4);
      ctx.strokeStyle = "rgba(148, 163, 184, 0.45)";
      ctx.lineWidth = 1.5;
      ctx.strokeRect(x, y, w, h);
      ctx.fillStyle = "#e2e8f0";
      ctx.font = "bold 14px Trebuchet MS";
      ctx.textAlign = "left";
      ctx.fillText(`${icon} ${label}`, x + 8, y + 16);
      ctx.textAlign = "right";
      ctx.fillText(`${Math.round(value)}/${maxValue}`, x + w - 8, y + 16);
    }

    function drawHudBars() {
      const collected = milks.filter(m => m.taken).length;
      const aliveEnemies = enemies.filter(e => e.hp > 0).length;
      const wp = weaponDefs[player.weaponIndex];
      const x = 16;
      const w = Math.min(320, canvas.width * 0.34);
      const h = 24;
      const gap = 8;
      const totalHudH = (h + gap) * 5 + 44;
      const y = Math.max(12, canvas.height - totalHudH - 12);

      drawStatBar(x, y, w, h, collected, totalMilk, "#3b82f6", "Milk", "🥛");
      drawStatBar(x, y + (h + gap) * 1, w, h, player.hp, player.maxHp, "#ef4444", "Health", "❤️");
      drawStatBar(x, y + (h + gap) * 2, w, h, player.ammo, player.maxAmmo, "#f59e0b", "Ammo", "🔫");
      drawStatBar(x, y + (h + gap) * 3, w, h, aliveEnemies, levelEnemyTarget(), "#22c55e", "Enemies", "👾");
      drawStatBar(x, y + (h + gap) * 4, w, h, player.xp, player.xpToNext, "#8b5cf6", "XP", "✨");

      ctx.fillStyle = "rgba(10, 14, 22, 0.52)";
      ctx.fillRect(x, y + (h + gap) * 5, w, 44);
      ctx.strokeStyle = "rgba(148, 163, 184, 0.45)";
      ctx.strokeRect(x, y + (h + gap) * 5, w, 44);
      ctx.fillStyle = "#e2e8f0";
      ctx.font = "bold 14px Trebuchet MS";
      ctx.textAlign = "left";
      const stateText = gameState === "playing" ? "Playing" : gameState === "won" ? "Won" : "Lost";
      ctx.fillText(`🎮 ${stateText}  |  ${wp.emoji} ${wp.name}  |  Floor ${dungeonLevel}: ${player.floorName}  |  Lvl ${player.xpLevel}`, x + 8, y + (h + gap) * 5 + 16);
      ctx.fillText("⌨️ WASD  🖱️ LMB (hold SMG)  🔢 1-4  🔥 F  |  Skill-up: 1-9", x + 8, y + (h + gap) * 5 + 38);
    }

    function setWeapon(index) {
      const maxIdx = weaponDefs.length - 1;
      player.weaponIndex = Math.max(0, Math.min(maxIdx, index));
    }

    function shoot() {
      const wp = weaponDefs[player.weaponIndex];
      if (gameState !== "playing" || gamePaused || player.shootCooldown > 0 || player.ammo < wp.ammoCost) return;

      for (let i = 0; i < wp.pellets; i++) {
        const spreadOffset = (Math.random() - 0.5) * wp.spread * 2;
        bullets.push({
          x: player.x,
          y: player.y,
          a: player.a + spreadOffset,
          speed: wp.speed,
          life: wp.life,
          damage: wp.damage * player.damageMult,
          hitRadius: wp.hitRadius
        });
      }
      player.ammo -= wp.ammoCost;
      player.shootCooldown = wp.cooldown * player.fireRateMult;
      player.muzzleFlash = wp.muzzle;
    }

    function castFireball() {
      if (gameState !== "playing" || gamePaused || !hasSkill("fireball") || player.fireballCooldown > 0) return;
      bullets.push({
        x: player.x,
        y: player.y,
        a: player.a,
        speed: 7.4,
        life: 1.5,
        damage: 40 * player.damageMult * player.fireballDamageMult,
        hitRadius: 0.38,
        type: "fire"
      });
      player.fireballCooldown = 1.05 * player.fireballCooldownMult;
      player.muzzleFlash = 0.15;
    }

    window.addEventListener("keydown", (e) => {
      const key = e.key.toLowerCase();
      if (choosingSkill) {
        if (key >= "1" && key <= "9") {
          const idx = Number(key) - 1;
          tryPickSkill(idx);
        }
        return;
      }
      keys.add(key);
      if (key === "1") setWeapon(0);
      if (key === "2") setWeapon(1);
      if (key === "3") setWeapon(2);
      if (key === "4") setWeapon(3);
      if (key === "q") setWeapon((player.weaponIndex - 1 + weaponDefs.length) % weaponDefs.length);
      if (key === "e") setWeapon((player.weaponIndex + 1) % weaponDefs.length);
      if (key === "f") castFireball();
    });
    window.addEventListener("keyup", (e) => keys.delete(e.key.toLowerCase()));

    canvas.addEventListener("click", () => {
      if (document.pointerLockElement !== canvas) {
        canvas.requestPointerLock();
      }
    });

    window.addEventListener("mousedown", (e) => {
      if (e.button !== 0) return;
      isMouseDown = true;
      if (document.pointerLockElement !== canvas) {
        canvas.requestPointerLock();
        return;
      }
      shoot();
    });
    window.addEventListener("mouseup", (e) => {
      if (e.button === 0) isMouseDown = false;
    });
    window.addEventListener("blur", () => { isMouseDown = false; });
    document.addEventListener("pointerlockchange", () => {
      if (document.pointerLockElement !== canvas) isMouseDown = false;
    });

    window.addEventListener("mousemove", (e) => {
      if (document.pointerLockElement !== canvas || gameState !== "playing") return;
      player.a += e.movementX * mouseSensitivity;
    });

    window.addEventListener("wheel", (e) => {
      if (document.pointerLockElement !== canvas || choosingSkill) return;
      const dir = e.deltaY > 0 ? 1 : -1;
      setWeapon((player.weaponIndex + dir + weaponDefs.length) % weaponDefs.length);
    }, { passive: true });

    canvas.addEventListener("contextmenu", (e) => e.preventDefault());

    let last = performance.now();
    function loop(now) {
      const dt = Math.min(0.033, (now - last) / 1000);
      last = now;
      update(dt);
      drawBackground();
      drawWorld();
      drawMinimap();
      drawHudBars();
      drawWeapon(now * 0.001);
      drawOverlay();
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);
  </script>
</body>
</html>
